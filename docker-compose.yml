services:
  postgres:
    image: postgres:16-alpine
    container_name: fedmri-postgres
    environment:
      POSTGRES_USER: fedmri
      POSTGRES_PASSWORD: fedmri
      POSTGRES_DB: fedmri
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fedmri"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    # HYBRID-MODE NOTE: you run the backend locally (`cd apps/backend && npm run
    # start:dev`), so this container is OPT-IN only. Without a profile it would also
    # bind host port 3001 and collide with your local backend — and its localhost
    # DB/Redis URLs don't resolve inside a container anyway. Start the full in-Docker
    # stack (incl. this) with:  docker compose --profile full up
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    container_name: fedmri-backend
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - ./apps/backend/uploads-tmp:/app/apps/backend/uploads-tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: fedmri-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: fedmri-ollama
    ports:
      - "11434:11434"
    volumes:
      # Model blobs live on D: drive (avoid C: pressure)
      - D:/ollama-models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "2"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: fedmri-ml-service
    environment:
      - INFERENCE_MODE=real
      - ATTN_MODE=blob
      # Active learning is ON by default. Doctor feedback shifts a per-subtype
      # confidence bias that /predict applies, so the SAME scan gains confidence
      # after approvals. State is persisted to the /al-state volume below, so it
      # stays "alive" across container restarts.
      - AL_MODE=mock
      - AL_STATE_PATH=/al-state/al_state.json
      - MODEL_V2_PATH=/model-v2
      - FEDSCRT_CKPT=/model-ckpt/fedscrt_final.pt
      # Host repo root → container path, so real attention can read the scans the
      # backend (running on the host) wrote to apps/backend/uploads-tmp.
      - HOST_WORKSPACE_ROOT=C:/Users/Dynabook/Documents/GitHub/fedmri-app
      - CONTAINER_WORKSPACE_ROOT=/workspace-root
    ports:
      - "8001:8001"
    volumes:
      # model-core/ (hyphen) = model source code (model.py, image_process.py)
      - ./model-core:/model-v2
      # model_core/ (underscore) = checkpoint (fedscrt_final.pt)
      - ./model_core:/model-ckpt
      # Uploaded scans, mounted at the translated host path so attention_for_path
      # can resolve C:\...\apps\backend\uploads-tmp\<id>.mha inside the container.
      - ./apps/backend/uploads-tmp:/workspace-root/apps/backend/uploads-tmp
      # Persisted active-learning state (learned confidence bias + version).
      - ./apps/ml-service/.al-state:/al-state
    restart: unless-stopped

  fl-coordinator:
    build:
      context: ./apps/fl-coordinator
      dockerfile: Dockerfile
    container_name: fedmri-fl-coordinator
    # Inherit FL_MODE / FL_STRATEGY / FL_WEBHOOK_SECRET from the repo-root .env so
    # the webhook secret always matches the backend.
    env_file:
      - .env
    environment:
      # The coordinator POSTs round results back to the backend. The backend runs
      # on the HOST (hybrid topology), so from inside this container it is reached
      # via host.docker.internal — NOT localhost (which would be the container).
      - BACKEND_URL=http://host.docker.internal:3001
      # Per-hospital feature caches the live FL-test (realfl.py) loads.
      - FL_CACHE_DIR=/app/fl_cache
    ports:
      - "8002:8002"
    extra_hosts:
      # Docker Desktop (Win/Mac) provides host.docker.internal automatically;
      # this line makes it resolve on Linux hosts too.
      - "host.docker.internal:host-gateway"
    volumes:
      # Live-reload the coordinator source and keep the fl_cache/*.npz available.
      - ./apps/fl-coordinator:/app
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
