services:
  postgres:
    image: postgres:16-alpine
    container_name: fedmri-postgres
    environment:
      POSTGRES_USER: fedmri
      POSTGRES_PASSWORD: fedmri
      POSTGRES_DB: fedmri
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fedmri"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    container_name: fedmri-backend
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - ./apps/backend/uploads-tmp:/app/apps/backend/uploads-tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: fedmri-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: fedmri-ollama
    ports:
      - "11434:11434"
    volumes:
      # Model blobs live on D: drive (avoid C: pressure)
      - D:/ollama-models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_PARALLEL: "2"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: fedmri-ml-service
    environment:
      - INFERENCE_MODE=real
      - ATTN_MODE=blob
      - MODEL_V2_PATH=/model-v2
      - FEDSCRT_CKPT=/model-v2/checkpoints/fedscrt_final.pt
      - HOST_WORKSPACE_ROOT=D:/study/BioInfo M2 (2026)/Memoir
      - CONTAINER_WORKSPACE_ROOT=/workspace-root
    ports:
      - "8001:8001"
    volumes:
      - C:/Users/akaro/Documents/GitHub/federated-learning-model:/model-v2
      - D:/study/BioInfo M2 (2026)/Memoir:/workspace-root
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
